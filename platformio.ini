[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    blynkkk/Blynk@^1.3.2
extra_scripts = pre:inject_env.py

[env:native]
platform = native
test_framework = unity
